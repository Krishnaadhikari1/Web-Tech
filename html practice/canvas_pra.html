<!-- Create a HTML page containing a div having id “dv1”. The div should contain canvas element. 
The id of canvas should be “mycanvas”. The height and width of canvas should be 200 and 300. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> canvas example </title>
</head>
<body>
    <div id="dv1">
        <canvas id="mycanvas" height="200" width="300"></canvas>
    </div>
</body>
</html>
