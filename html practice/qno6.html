<!-- Write HTML script to create HTML form and perform validation using javascript.
 Validate for username to be empty, password should be of length at least 5, and the check box should be checked. -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> form and validation </title>
 </head>
 <body>
    <form onsubmit="return validationform()">
        <label for="username" >username :</label>
        <input type="text" id="username"   name="username"> <br>
         
        <label for="password"> password :</label>
        <input type="password" id="password" name="password"> <br>

        <label for="hobbies">hobbies </label>
        <input type="checkbox" id="hobbies" name="hobbies"> <br>

        <input type="submit" value="submit">
    </form>
    <script>
        function validationform(){
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var hobbies = document.getElementById('hobbies').checked;

            if(username==''){
                alert('username cannot be empty');
                return false;
            }
            if(password.length<5){
                alert('password should be at least 5 char long ');
                return false;
            }
            if(!hobbies){
                alert('please check the hobbies cheakbox');
                return false;
            }
        return true;

        }
    </script>
 </body>
 </html>
