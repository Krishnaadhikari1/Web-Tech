<!-- Write a HTML script using audio tag. Set the autoplay, preload and loop properties to appropriate values. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> audio tag example </title>
</head>
<body>
    <h1> html audio tag with autoplay , preload and loop </h1>
    <audio controls autoplay preload="auto" loop>
        <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
