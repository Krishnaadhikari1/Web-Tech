<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> html division</title>
</head>
<body>
    <div> 
        <h1>Welcome</h1>
        <p>This is inside a div.</p>
    </div>
</body>
</html>
