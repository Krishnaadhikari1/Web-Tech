<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Attributes Example</title>
</head>
<body>

    <!-- Heading -->
    <h1 id="main-heading" class="title">
        Welcome to HTML Attributes
    </h1>

    <!-- Paragraph with style attribute -->
    <p style="color: blue; font-size: 20px;">
        This is a paragraph using the style attribute.
    </p>

    <!-- Link with href and target -->
    <a href="https://www.google.com" target="_blank">
        Open Google
    </a>

    <br><br>

    <!-- Image with src, alt, width, height -->
    <img src="image.jpg"
         alt="Nature Image"
         width="300"
         height="200">

    <br><br>

    <!-- Input field -->
    <input type="text"
           placeholder="Enter your name"
           required>

    <br><br>

    <!-- Button -->
    <button disabled>
        Disabled Button
    </button>

    <br><br>

    <!-- Ordered list -->
    <ol type="A">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <br>

    <!-- Table -->
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>

        <tr>
            <td>Krishna</td>
            <td>20</td>
        </tr>
    </table>

</body>
</html>
