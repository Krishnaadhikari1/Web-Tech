<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title> column span in html </title>
    <style>
        table,td,td{
            border: 1px solid black ;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <table>
        <caption> student details </caption>
        <tr>
            <td> name </td>
            <td> address </td>
            <td> phone no</td>
        </tr>
        <tr>
           <td>krishna </td>
           <td rowspan="2">surkhet </td>
           <td> 9865475774</td>
        </tr>
        <tr>
            <td> dhiran </td>
            <td> 9886557777</td>
        </tr>
    </table>
</body>
</html>
