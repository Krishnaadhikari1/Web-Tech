<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> elements in the html </title>
</head>
<body>
    <h1> this is the frist heading .</h1>
    <p>
        this is the paragraph of the html documents.
    </p>
    <a href="https://www.facebook.com/">  visit facebook </a>

</body>
</html>
<!--
HTML Elements:
Definition:
- An HTML element is everything from the start tag to the end tag
  Example: <p>This is a paragraph</p>

Structure:
- Opening tag + Content + Closing tag
  Example: <h1>Heading</h1>

Types of Elements:

1. Heading Element (<h1> to <h6>)
   - Used for titles and headings
   Example:
   <h1>Main Heading</h1>
   <h3>Sub Heading</h3>

2. Paragraph Element (<p>)
   - Used to display text in paragraph form
   Example:
   <p>This is a paragraph.</p>

3. Link Element (<a>)
   - Used to create hyperlinks
   Example:
   <a href="https://google.com">Visit Google</a>

4. Image Element (<img>)
   - Used to display images (self-closing tag)
   Example:
   <img src="image.jpg" alt="My Image">

5. Container Elements (<div>, <span>)
   - Used to group content
   Example:
   <div>Block container</div>
   <span>Inline container</span>

6. List Elements (<ul>, <ol>, <li>)
   - Used to create lists
   Example:
   <ul>
     <li>Item 1</li>
     <li>Item 2</li>
   </ul>
-->
