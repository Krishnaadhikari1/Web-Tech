<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> page title </title>
</head>
<body>
    <h1> this is the heading of the html </h1>
    <p>
        this is the paragraph .
    </p>
</body>
</html>

<!--
HTML Document Structure:
1. <!DOCTYPE html>
   - Declares this document as HTML5

2. <html>
   - Root element of the webpage

3. <head>
   - Contains meta information (title, charset, CSS links)
   - Not visible on the webpage

4. <body>
   - Contains all visible content (text, images, links, etc.)

5. <h1> to <h6> (Headings)
   - Used for titles and headings
   - <h1> is largest, <h6> is smallest

6. <p> (Paragraph)
   - Used to write text content in paragraph form .
-->
