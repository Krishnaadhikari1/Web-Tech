<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> html formating </title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
  <title>HTML Formatting</title>
</head>
<body>
<h1>HTML Formatting Example</h1>
<p>This is <b>bold</b> and <i>italic</i> text.</p>
<p>This is <strong>important</strong> and <em>emphasized</em>.</p>
<p>This is <mark>highlighted</mark> text.</p>
<p>H<sub>2</sub>O and x<sup>2</sup></p>
<hr>
<ul>
  <li>HTML</li>
  <li>CSS</li>
</ul>
</body>
</html>
</body>
</html>

<!-- 
<b> → Makes text bold (no importance meaning)
<strong> → Bold + shows important content
<i> → Makes text italic
<em> → Italic + emphasis (semantic meaning)
<u> → Underlines text
<mark> → Highlights text
<small> → Smaller text
<del> → Shows deleted (strikethrough) text
<ins> → Shows inserted (underlined) text
<sub> → Subscript (H₂O)
<sup> → Superscript (x²) 
h1> - <h6> → Headings (largest to smallest)
<p> → Paragraph
<br> → Line break (next line)
<hr> → Horizontal line (section divider)
<pre> → Keeps original spacing and formatting
<ul> → Unordered list (bullet points)
<ol> → Ordered list (numbered)
<li> → List item    
    -->
