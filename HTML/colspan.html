<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title> column span in Html </title>
    <style> 
        table,td,td{
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td> Name </td>
            <td colspan="2">phone number</td>
        </tr>
        <tr>
            <td> krishna </td>
            <td> 986578254</td>
            <td> 985647554</td>
        </tr>
    </table>
</body>
</html>
