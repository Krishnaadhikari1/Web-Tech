<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> span and tt elements </title>
</head>
<body>
    <p>
    this is a <span style="color: red;"> red text </span> inside the paragraph .
    </p>
    <p>
        this is a <tt> monospace text </tt>
    </p>
</body>
</html>

<!-- 
#<span> Element
Type: Inline element
Purpose: Used to group or style a small part of text
No default styling (works with CSS)

#<tt> Element (Teletype Text)
Type: Inline element
Purpose: Displays text in monospace font (like typewriter)
Deprecated in HTML5 (not recommended now) 
-->
