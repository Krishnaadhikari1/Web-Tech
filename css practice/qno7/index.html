<!--Create a HTML page with a div with some content and two paragraph with some contents having id p1 and p2. 
Write external CSS for the div tag having fixed position with border style solid and width 2px.
the p1 should have relative position. The font type of p1 should be Arial and color should be red. 
The p2 have absolute position with top 0px and left 200px. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> position example </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div> this is div with fixed position and border </div>

    <p id="p1"> this is paragraph1 (relative position ,arial font and red color) </p>

    <p id="p2"> this is paragraph2 (absolute position ) </p>
</body>
</html>
