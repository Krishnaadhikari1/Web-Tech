<!-- What are the usages of class and id selectors in CSS? Illustrate with example. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #div1{      /* id selector */
            color: red;
            background-color: aqua;
            padding: 10px;
            width: 100px;
        }
        .p1{                /*   class selector */
            color: blue;
            background-color: yellow;
            padding: 10px;
            width: 200px;
        }
    </style>
</head>
<body>
    <p id="div1" > this is the heading </h1>
    <div class="p1"> this is container </div>
</body>
</html>
