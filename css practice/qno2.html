<!-- Define CSS. What is the use of CSS shadow effects? Write an HTML script with proper CSS as per the following description. 
Display a text content “CSIT Exam” in a div with id div1. The text should have a horizontal shadow of 3px and a vertical 
shadow of 2px. The shadow color should be green. Also set the horizontal and vertical shadow of the div to 10px respectively
 with the shadow color of div to blue. -->

 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> css shadow effect </title>
    <style>
        #div1{
           width: 200px;
           padding: 20px;
           font-size: 30px;
           font-weight: bold;
           
           text-shadow: 3px 2px green;
        
           box-shadow: 10px 10px blue;
           border: 1px solid;
        }
    </style>
 </head>
 <body>
    <div id="div1">
        CSIT EXAM
    </div>
 </body>
 </html>
