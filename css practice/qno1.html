<!-- Create an HTML page containing three paragraphs p1, p2 and p3 with some contents.
 Write internal CSS to set the position of p1 to relative, p2 to float and p3 to absolute. -->

 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> css position </title>
    <style>
        #p1{
            position: relative;
            left: 20px;
            color: red;
        }
        #p2{
            float: left;
            width: 250px;
            background-color: aqua;
            padding: 10px;
        }
        #p3{
            position: absolute;
            top: 150px;
            left: 300px;
            color: blue;
        }
    </style>
 </head>
 <body>
    <p id="p1"> this is p1 paragraph , its position set to be relative < /p>
    <p id="p2"> this is p2 paragraph ,  It is floated to the left using float property < /p>
    <p id="p3"> this is p3 paragraph , its position set to be absolute  </p>
 </body>
 </html>
