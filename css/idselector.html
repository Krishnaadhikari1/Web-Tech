<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> css id  selector </title>
    <style> 
        #tittle {
            text-align: center;
            color: red;
        }
    </style>
</head>
<body>
    <h2 id="tittle"> this is the heading </h2>
    <p> this is paragraph </p>
</body>
</html>

<!-- id selector us used to style a specific and unique html element using its id attribute -->
