<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> styling the html text </title>
    <style>
        h1{
            color: red;
            text-align: center;
        }
        p{
            color: blue;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1> this is the heading </h1>
    <p> this is paragraph </p>
</body>
</html>
