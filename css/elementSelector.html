<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> element selector in the css </title>
    <style>
        p{
            text-align: center;
            color: orange;
            background-color: aqua;
        }
    </style>
</head>
<body>
    <h2> this is the  heading </h2>
    <p> this the paragraph </p>
</body>
</html>
<!-- element selector selects html elements based on the element same for  eg p{ } -->
